apiVersion: v1
kind: Namespace
metadata:
  name: github-runner
---
apiVersion: v1
kind: Secret
metadata:
  name: github-runner-secret
  namespace: github-runner
type: Opaque
stringData:
  # GitHub Actions Runner Registration Token
  # TODO: 사용자가 직접 깃허브 레포지토리 설정에서 발급받아 채워 넣어야 합니다.
  runner-token: "PLACEHOLDER_PLEASE_UPDATE"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-runner
  namespace: github-runner
  labels:
    app: github-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: github-runner
  template:
    metadata:
      labels:
        app: github-runner
    spec:
      containers:
      # 1. GitHub Actions Runner Agent
      - name: runner
        image: summerwind/actions-runner:latest
        env:
        - name: REPO_URL
          value: "https://github.com/koscom-team01/test-web-app" # 대상 애플리케이션 레포지토리 URL
        - name: RUNNER_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-runner-secret
              key: runner-token
        - name: DOCKER_HOST
          value: tcp://localhost:2375
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1024Mi
      # 2. Docker-in-Docker (DinD) Sidecar (도커 이미지 빌드 지원용)
      - name: dind
        image: docker:dind
        securityContext:
          privileged: true
        env:
        - name: DOCKER_TLS_CERTDIR
          value: ""
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2048Mi
