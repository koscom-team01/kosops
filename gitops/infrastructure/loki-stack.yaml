apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: loki-stack
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 2.10.2
    helm:
      values: |
        loki:
          enabled: true
          persistence:
            enabled: true
            size: 10Gi
        promtail:
          enabled: true
        grafana:
          enabled: true
          adminPassword: adminpassword
          ingress:
            enabled: true
            ingressClassName: nginx
            annotations:
              ingress.kubernetes.io/ssl-redirect: "false"
              nginx.ingress.kubernetes.io/ssl-redirect: "false"
            hosts:
              - grafana.hwangonjang.com
            path: /
        prometheus:
          enabled: true
        filebeat:
          enabled: false
        logstash:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
