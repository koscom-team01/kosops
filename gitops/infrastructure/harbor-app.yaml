apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: harbor
    repoURL: https://helm.goharbor.io
    targetRevision: 1.19.1
    helm:
      values: |
        expose:
          type: ingress
          tls:
            enabled: false
          ingress:
            hosts:
              core: harbor.hwangonjang.com
            className: nginx
            annotations:
              ingress.kubernetes.io/ssl-redirect: "false"
              nginx.ingress.kubernetes.io/proxy-body-size: "0"
        externalURL: https://harbor.hwangonjang.com
        persistence:
          enabled: true
          resourceTemplates:
            - name: data
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 10Gi
        database:
          internal:
            volumeSize: 2Gi
        redis:
          internal:
            volumeSize: 1Gi
        trivy:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: harbor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
