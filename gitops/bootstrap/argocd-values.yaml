server:
  extraArgs:
    - --insecure
  service:
    type: ClusterIP
  # Ingress를 통한 ArgoCD 노출 설정
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      ingress.kubernetes.io/ssl-redirect: "false"
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
    hostname: argocd.hwangonjang.com
    path: /
